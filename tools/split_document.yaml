identity:
  name: split_document
  author: document_cutter
  label:
    en_US: Split Document
    zh_Hans: 文档切分
description:
  human:
    en_US: Extract a page range from PDF / Word / Excel documents, output either text chunks or a same-format binary file.
    zh_Hans: 按页码范围从 PDF / Word / Excel 文档中提取内容，输出文本块或同格式的二进制文件。
  llm: Extract a page range from a document. Output mode can be text chunks or a same-format file (PDF->PDF, docx->docx, xlsx->xlsx).
parameters:
  - name: file
    type: file
    required: true
    label:
      en_US: Document File
      zh_Hans: 文档文件
    human_description:
      en_US: The document file. Supports PDF, Word (.docx), and Excel (.xlsx/.xls).
      zh_Hans: 文档文件，支持 PDF、Word (.docx) 和 Excel (.xlsx/.xls)。
    llm_description: The document file.
    form: llm
  - name: split_mode
    type: select
    required: true
    label:
      en_US: Output Mode
      zh_Hans: 输出模式
    human_description:
      en_US: "page_text: output text chunks per page. page_file: output one same-format binary file containing the selected pages."
      zh_Hans: "page_text: 按页输出文本块。page_file: 输出包含指定页码的同格式二进制文件（PDF->PDF，docx->docx，xlsx->xlsx）。"
    llm_description: "Output format: 'page_text' returns text chunks, 'page_file' returns a binary file of the same format."
    form: form
    options:
      - value: page_text
        label:
          en_US: Text Chunks
          zh_Hans: 文本块输出
      - value: page_file
        label:
          en_US: Same-Format File
          zh_Hans: 同格式文件输出
    default: page_text
  - name: page_range
    type: string
    required: false
    label:
      en_US: Page Range
      zh_Hans: 页码范围
    human_description:
      en_US: "1-based inclusive page range. Examples: '1-10', '5-' (from 5 to end), '-3' (first 3), '7' (single page), '' (all). For Word, page means manual page-break count. For Excel, page means sheet index."
      zh_Hans: "1 起始的闭区间页码。示例：'1-10'、'5-'（第5页到末尾）、'-3'（前3页）、'7'（单页）、空（全部）。Word 的页码按手动分页符计数；Excel 的页码按 Sheet 序号。"
    llm_description: Page range to extract. Format 'N-M' or 'N-' or '-M' or 'N'. Empty means all pages.
    form: form
    default: ""
  - name: pages_per_chunk
    type: number
    required: false
    label:
      en_US: Pages Per Chunk (text mode)
      zh_Hans: 每N页合并为一块（仅文本模式）
    human_description:
      en_US: Text mode only. Group every N consecutive pages into one chunk. Default 1.
      zh_Hans: 仅文本块输出模式生效。每 N 页合并为一个 chunk。默认 1（每页一块）。
    llm_description: Number of consecutive pages to merge into one chunk in text mode.
    form: form
    default: 1
    min: 1
    max: 100
  - name: delivery_mode
    type: select
    required: false
    label:
      en_US: Delivery Mode (page_file only)
      zh_Hans: 文件交付方式（仅 page_file 模式）
    human_description:
      en_US: "blob: return file as Dify blob (requires correct FILES_URL). upload_link: POST to external upload service (configured in provider credentials) and return download_url."
      zh_Hans: "blob: 以 Dify 文件 blob 返回（依赖 FILES_URL 配置正确）。upload_link: POST 到外部上传服务（在 Provider 凭证中配置），返回下载链接。"
    llm_description: "File delivery method for page_file mode."
    form: form
    options:
      - value: blob
        label:
          en_US: Blob (direct)
          zh_Hans: 直接 Blob 返回
      - value: upload_link
        label:
          en_US: Upload Link (external service)
          zh_Hans: 外部服务上传并返回链接
    default: blob
  - name: output_filename
    type: string
    required: false
    label:
      en_US: Output Filename (without ext)
      zh_Hans: 输出文件名（不含扩展名）
    human_description:
      en_US: Optional custom base name for the output file. Auto-sanitized. Leave blank to auto-generate.
      zh_Hans: 自定义输出文件名（不含扩展名），会自动清洗非法字符。留空则自动命名。
    llm_description: Custom base name for the output file without extension.
    form: form
    default: ""
extra:
  python:
    source: tools/split_document.py
